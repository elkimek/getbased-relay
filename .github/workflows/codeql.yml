name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly catch-up scan so newly-published rules surface against
    # otherwise-quiet weeks.
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-extended adds taint-flow + injection rules beyond the
          # default set. Worth it for an admin endpoint that runs DELETE
          # on a SQLite DB.
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
