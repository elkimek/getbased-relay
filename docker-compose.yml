services:
  relay:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - relay-data:/data
    environment:
      - RELAY_PORT=4000
      - ADMIN_PORT=4002
      - QUOTA_PER_OWNER_MB=10
      - QUOTA_GLOBAL_MB=1000
      - LOG_FORMAT=json
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4002/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  context-gateway:
    build: ./context-gateway
    ports:
      - "4001:4001"
    volumes:
      - context-data:/opt/context-gateway/data
    restart: unless-stopped

volumes:
  relay-data:
  context-data:
